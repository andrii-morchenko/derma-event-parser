<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derma Event Parser</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 24px; color: #111; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  p { color: #555; line-height: 1.6; margin-bottom: 16px; }
  a { display: inline-block; background: #000; color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; }
  a:hover { background: #333; }
  .badge { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 12px; padding: 3px 10px; border-radius: 20px; margin-bottom: 24px; }
</style>
</head>
<body>
  <div class="badge">● Active</div>
  <h1>Derma Medical Event Parser</h1>
  <p>This service automatically scans <strong>dermamedical.co.uk</strong> every day at <strong>00:00 BST</strong> and sends an email alert when events are expired or expiring soon.</p>
  <p>To trigger a manual scan, visit the API endpoint:</p>
  <a href="/api/check-events">Run scan now →</a>
</body>
</html>
